apiVersion: apps/v1
kind: Deployment
metadata:
  name: electricity-billing-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: electricity-billing
  template:
    metadata:
      labels:
        app: electricity-billing
    spec:
      containers:
      - name: billing-app
        image: your-dockerhub/electricity-billing:latest
        ports:
        - containerPort: 8080   # Not a web server, but we keep for consistency
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: electricity-billing-service
spec:
  type: NodePort
  selector:
    app: electricity-billing
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30083